<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Formanova Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<link rel="stylesheet" type="text/css" href="admin.css">



</head>
<body>

<div id="toast"></div>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      </div>
      <h1>Formanova</h1>
    </div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to your Admin dashboard</p>
    <div class="form-group">
      <label for="login-email">Email Address</label>
      <div class="input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <input type="email" id="login-email" placeholder="admin@formanova.com" />
      </div>
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <div class="input-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="login-password" placeholder="Enter your password" />
        <button class="toggle-pw" id="pw-toggle" type="button">
          <svg id="eye-show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eye-hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <div class="form-row">
      <label><input type="checkbox" id="remember-me" /> Remember me</label>
      <a href="#">Forgot password?</a>
    </div>
    <button class="btn-primary" id="login-btn">Sign In</button>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen" class="screen" style="position:relative;">
  <button class="mobile-toggle" id="mobile-toggle-btn">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
  </button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      </div>
      <span>Formanova</span>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer"><p>© 2026 Formanova Admin</p></div>
  </aside>

  <header>
    <div class="header-title" id="header-title">Dashboard</div>
    <div class="header-right">
      <div id="sync-status" style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--success);margin-right:6px;">
        <span style="width:7px;height:7px;border-radius:50%;background:var(--success);display:inline-block;animation:pulse 2s infinite;"></span>
        <span data-i18n="live">Live</span>
      </div>
      <div class="dropdown-wrapper">
        <button class="icon-btn" id="notif-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
          <span class="notif-badge" id="notif-count">3</span>
        </button>
        <div class="dropdown-menu" id="notif-dd" style="min-width:300px;">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px 6px;">
            <span style="font-size:13px;font-weight:700;" data-i18n="notifications">Notifications</span>
            <span style="font-size:12px;color:var(--primary);cursor:pointer;font-weight:600;" id="mark-read-btn" data-i18n="markAllRead">Mark all read</span>
          </div>
          <hr style="border:none;border-top:1px solid var(--border);margin:4px 0;"/>
          <div id="notif-list"></div>
        </div>
      </div>
      <div class="dropdown-wrapper">
        <button class="user-btn" id="user-menu-btn">
          <div class="avatar" id="header-avatar">A</div>
          <span id="header-email">admin</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="dropdown-menu" id="user-dd">
          <div class="dropdown-label" data-i18n="myAccount">My Account</div>
          <hr/>
          <button class="dropdown-item" id="go-settings-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            <span data-i18n="settings">Settings</span>
          </button>
          <hr/>
          <button class="dropdown-item danger" id="logout-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            <span data-i18n="logOut">Log out</span>
          </button>
        </div>
      </div>
    </div>
  </header>
  <main id="main-content"></main>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-dialog">
    <div class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></div>
    <h3 data-i18n="confirmDelete">Confirm Delete</h3>
    <p id="confirm-msg">Are you sure?</p>
    <div class="btns">
      <button class="btn btn-outline" id="cancel-delete-btn" data-i18n="cancel">Cancel</button>
      <button class="btn btn-danger" id="confirm-delete-btn" data-i18n="delete">Delete</button>
    </div>
  </div>
</div>

<!-- USER MODAL -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="user-modal-title" data-i18n="editUser">Edit User</h3>
      <button class="modal-close" id="close-user-modal"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row-2">
        <div class="form-field"><label data-i18n="fullName">Full Name *</label><input type="text" id="u-name" placeholder="John Doe" /></div>
        <div class="form-field"><label data-i18n="email">Email *</label><input type="email" id="u-email" placeholder="john@example.com" /></div>
      </div>
      <div class="form-row-2">
        <div class="form-field">
          <label data-i18n="role">Role</label>
          <select id="u-type">
            <option value="Learner" data-i18n="learner">Learner</option>
            <option value="Instructor" data-i18n="instructor">Instructor</option>
            <option value="Admin" data-i18n="admin">Admin</option>
            <option value="Recruiter" data-i18n="recruiter">Recruiter</option>
          </select>
        </div>
        <div class="form-field"><label data-i18n="phone">Phone</label><input type="text" id="u-phone" placeholder="+213 xxx xxx xxx" /></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancel-user-btn" data-i18n="cancel">Cancel</button>
      <button class="btn btn-purple" id="user-save-btn" data-i18n="saveChanges">Save Changes</button>
    </div>
  </div>
</div>

<!-- COURSE MODAL -->
<div class="modal-overlay" id="course-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="course-modal-title" data-i18n="editCourse">Edit Course</h3>
      <button class="modal-close" id="close-course-modal"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row-2">
        <div class="form-field"><label data-i18n="courseName">Course Name *</label><input type="text" id="c-name" placeholder="Introduction to React" /></div>
        <div class="form-field"><label data-i18n="instructor">Instructor *</label><input type="text" id="c-instructor" placeholder="Dr. Smith" /></div>
      </div>
      <div class="form-row-2">
        <div class="form-field"><label data-i18n="type">Type</label><select id="c-type"><option value="PDF">PDF</option><option value="MP4">MP4</option><option value="PPTX">PPTX</option><option value="DOC">DOC</option><option value="MP3">MP3</option></select></div>
        <div class="form-field"><label data-i18n="price">Price ($)</label><input type="number" id="c-price" placeholder="0" min="0" /></div>
      </div>
      <div class="form-field"><label data-i18n="category">Category</label><input type="text" id="c-category" placeholder="e.g. Technology, Business..." /></div>
      <div class="form-field"><label data-i18n="description">Description</label><textarea id="c-desc" placeholder="Course description..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancel-course-btn" data-i18n="cancel">Cancel</button>
      <button class="btn btn-purple" id="course-save-btn" data-i18n="saveChanges">Save Changes</button>
    </div>
  </div>
</div>

<!-- JOB MODAL -->
<div class="modal-overlay" id="job-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="job-modal-title" data-i18n="postJob">Post Job Offer</h3>
      <button class="modal-close" id="close-job-modal"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row-2">
        <div class="form-field"><label data-i18n="jobTitle">Job Title *</label><input type="text" id="j-title" placeholder="Senior Frontend Developer" /></div>
        <div class="form-field"><label data-i18n="company">Company *</label><input type="text" id="j-company" placeholder="Acme Corp" /></div>
      </div>
      <div class="form-row-2">
        <div class="form-field"><label data-i18n="location">Location</label><input type="text" id="j-location" placeholder="Tlemcen, Algeria" /></div>
        <div class="form-field"><label data-i18n="type">Type</label><select id="j-type"><option data-i18n="fullTime">Full-time</option><option data-i18n="partTime">Part-time</option><option data-i18n="remote">Remote</option><option data-i18n="internship">Internship</option><option data-i18n="freelance">Freelance</option></select></div>
      </div>
      <div class="form-row-2">
        <div class="form-field"><label data-i18n="salaryRange">Salary Range</label><input type="text" id="j-salary" placeholder="e.g. $2,000 – $3,500/mo" /></div>
        <div class="form-field"><label data-i18n="status">Status</label><select id="j-status"><option data-i18n="active">Active</option><option data-i18n="pending">Pending</option><option data-i18n="closed">Closed</option></select></div>
      </div>
      <div class="form-field"><label data-i18n="descriptionJob">Description</label><textarea id="j-desc" placeholder="Job description, requirements, responsibilities..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancel-job-btn" data-i18n="cancel">Cancel</button>
      <button class="btn btn-purple" id="job-save-btn" data-i18n="postJob">Post Job</button>
    </div>
  </div>
</div>

<!-- CERT MODAL -->
<div class="modal-overlay" id="cert-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="cert-modal-title" data-i18n="issueCert">Issue Certificate</h3>
      <button class="modal-close" id="close-cert-modal"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row-2">
        <div class="form-field"><label data-i18n="learnerName">Learner Name *</label><input type="text" id="cert-learner" placeholder="Jane Doe" /></div>
        <div class="form-field"><label data-i18n="courseCert">Course *</label><input type="text" id="cert-course" placeholder="React Fundamentals" /></div>
      </div>
      <div class="form-row-2">
        <div class="form-field"><label data-i18n="issueDate">Issue Date</label><input type="date" id="cert-date" /></div>
        <div class="form-field"><label data-i18n="grade">Grade</label><select id="cert-grade"><option data-i18n="distinction">Distinction</option><option data-i18n="merit">Merit</option><option data-i18n="pass">Pass</option></select></div>
      </div>
      <div class="form-field"><label data-i18n="certId">Certificate ID</label><input type="text" id="cert-id" placeholder="Auto-generated" readonly style="opacity:0.6;cursor:default;background:#f8fafc"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancel-cert-btn" data-i18n="cancel">Cancel</button>
      <button class="btn btn-purple" id="cert-save-btn" data-i18n="issueCert">Issue Certificate</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<script type="module" src="admin.js"></script>
</body>
</html>
